  server:
    port: 8085

  spring:
    application:
      name: gateway-service
    cloud:
      gateway:
        globalcors:
          add-to-simple-url-handler-mapping: true
          corsConfigurations:
            '[/**]':
              allowedOrigins:
                - "http://localhost:5173"
              allowedMethods:
                - GET
                - POST
                - PUT
                - DELETE
                - OPTIONS
              allowedHeaders:
                - "*"
              allowCredentials: true
        routes:

          # PUBLIC USER APIs (NO JWT)
          - id: user-public
            uri: http://localhost:8080
            predicates:
              - Path=/api/users/signup,/api/users/login,/api/users/validate

          # PROTECTED USER APIs (JWT REQUIRED)
          - id: user-protected
            uri: http://localhost:8080
            predicates:
              - Path=/api/users/**


          # AUTH SERVICE (PUBLIC)
          - id: auth-service
            uri: http://localhost:8081
            predicates:
              - Path=/api/auth/**

  management:
    endpoints:
      web:
        exposure:
          include: health,info
    endpoint:
      health:
        show-details: always

  jwt:
    public-key-path: classpath:keys/public.pem
    expiration: 86400000

  logging:
    level:
      org.springframework.cloud.gateway: DEBUG
      org.springframework.security: DEBUG