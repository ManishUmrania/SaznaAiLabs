server:
  port: 8080

spring:
  application:
    name: identity-service

  datasource:
    url: jdbc:postgresql://localhost:5432/sazna_db
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  public-key-path: src/main/resources/keys/public.pem
  expiration: 86400000

logging:
  level:
    com.sazna: DEBUG

app:
  cors:
    allowed-origins:
      - http://localhost:5177