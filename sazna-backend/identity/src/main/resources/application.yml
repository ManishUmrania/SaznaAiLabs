server:
  port: 8080

spring:
  application:
    name: identity-service

  datasource:
    url: jdbc:postgresql://localhost:5432/sazna_db
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: this_is_a_very_long_secret_key_at_least_64_characters_long_for_hs512_algorithm_usage
  expiration: 86400000

logging:
  level:
    com.sazna: DEBUG