server:
  port: 8081

spring:
  application:
    name: cipher-service

  datasource:
    url: jdbc:postgresql://localhost:5432/sazna_db
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  private-key-path: src/main/resources/keys/private.pem
  public-key-path: src/main/resources/keys/public.pem
  expiration: 86400000


logging:
  level:
    com.sazna: DEBUG

app:
  cors:
    allowed-origins:
      - http://localhost:5173