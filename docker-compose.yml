version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: sazna-postgres
    environment:
      POSTGRES_DB: sazna_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Identity Service (User Management)
  identity-service:
    build:
      context: .
      dockerfile: sazna-backend/identity/Dockerfile
    container_name: sazna-identity
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sazna_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Cipher Service (Authentication)
  cipher-service:
    build:
      context: .
      dockerfile: sazna-backend/cipher/Dockerfile
    container_name: sazna-cipher
    ports:
      - "8081:8081"
    environment:
      IDENTITY_SERVICE_URL: http://identity-service:8080
    depends_on:
      identity-service:
        condition: service_started

volumes:
  postgres_data: